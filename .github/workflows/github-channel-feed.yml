name: GitHub Channel Feed

on:
  push:
    branches:
      - '**'
  pull_request_target:
    types:
      - opened
      - reopened
      - closed
  release:
    types:
      - published
  workflow_dispatch: {}

permissions:
  contents: read
  pull-requests: read

jobs:
  post-github-activity:
    name: Post GitHub Activity
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'pull_request_target' ||
      github.event.action == 'opened' ||
      github.event.action == 'reopened' ||
      (github.event.action == 'closed' && github.event.pull_request.merged == true)
    env:
      DISCORD_GITHUB_WEBHOOK_URL: ${{ secrets.DISCORD_GITHUB_WEBHOOK_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Post GitHub activity to Discord
        if: env.DISCORD_GITHUB_WEBHOOK_URL != ''
        continue-on-error: true
        env:
          DISCORD_WEBHOOK_URL: ${{ env.DISCORD_GITHUB_WEBHOOK_URL }}
        run: node scripts/ci/post-github-activity-discord-webhook.mjs
