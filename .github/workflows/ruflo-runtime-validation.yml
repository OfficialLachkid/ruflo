name: Ruflo Runtime Validation

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/**'
      - '.github/workflows/ruflo-runtime-validation.yml'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - 'package.json'
      - 'package-lock.json'
      - 'config/discord/**'
      - 'config/runtime/**'
      - 'config/supabase/**'
      - 'services/discord-bot/**'
      - 'services/task-router/**'
      - 'services/lib/**'
      - 'scripts/**'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/**'
      - '.github/workflows/ruflo-runtime-validation.yml'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - 'package.json'
      - 'package-lock.json'
      - 'config/discord/**'
      - 'config/runtime/**'
      - 'config/supabase/**'
      - 'services/discord-bot/**'
      - 'services/task-router/**'
      - 'services/lib/**'
      - 'scripts/**'

permissions:
  contents: read

jobs:
  runtime-validation:
    name: Runtime Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve diff range
        id: diff
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "base=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
            echo "head=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event_name }}" == "push" && "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]]; then
            echo "base=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
            echo "head=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "base=" >> "$GITHUB_OUTPUT"
            echo "head=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Validate runtime config examples
        run: node scripts/ci/validate-runtime-config.mjs

      - name: Check whitespace and merge markers
        shell: bash
        run: |
          if [[ -n "${{ steps.diff.outputs.base }}" ]]; then
            git diff --check "${{ steps.diff.outputs.base }}" "${{ steps.diff.outputs.head }}"
          else
            git diff-tree --check --no-commit-id --root -r "${{ steps.diff.outputs.head }}"
          fi

      - name: Scan changed files for secrets
        run: node scripts/ci/scan-changed-secrets.mjs --base "${{ steps.diff.outputs.base }}" --head "${{ steps.diff.outputs.head }}"

      - name: Enforce conventional commits on PRs
        if: github.event_name == 'pull_request'
        run: node scripts/ci/check-conventional-commits.mjs --base "${{ steps.diff.outputs.base }}" --head "${{ steps.diff.outputs.head }}"

      - name: Enforce script-size guardrail
        run: node scripts/ci/check-script-size-guardrail.mjs --base "${{ steps.diff.outputs.base }}" --head "${{ steps.diff.outputs.head }}"

      - name: Install dependencies
        run: npm install --legacy-peer-deps --no-audit --no-fund

      - name: Run Discord spine tests
        run: npm run test:discord-spine

  notify-ci-channel:
    name: Notify CI Channel
    runs-on: ubuntu-latest
    needs:
      - runtime-validation
    if: always()
    env:
      DISCORD_CI_WEBHOOK_URL: ${{ secrets.DISCORD_GITHUB_CI_WEBHOOK_URL || secrets.DISCORD_CI_WEBHOOK_URL || secrets.DISCORD_GITHUB_WEBHOOK_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Post CI result to Discord
        if: env.DISCORD_CI_WEBHOOK_URL != ''
        continue-on-error: true
        env:
          DISCORD_WEBHOOK_URL: ${{ env.DISCORD_CI_WEBHOOK_URL }}
          CI_STATUS: ${{ needs.runtime-validation.result }}
          CI_WORKFLOW_NAME: ${{ github.workflow }}
          CI_JOB_NAME: Runtime Validation
          CI_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          CI_REPOSITORY: ${{ github.repository }}
          CI_REF_NAME: ${{ github.ref_name }}
          CI_SHA: ${{ github.sha }}
          CI_EVENT_NAME: ${{ github.event_name }}
          CI_ACTOR: ${{ github.actor }}
          CI_PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: node scripts/ci/post-ci-discord-webhook.mjs
